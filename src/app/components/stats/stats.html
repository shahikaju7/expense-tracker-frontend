<div style="max-width: 900px; margin: 32px auto; padding: 0 24px;">

  <div *ngIf="loading" style="text-align: center; padding: 60px;
    color: #94a3b8;">
    Loading stats...
  </div>

  <div *ngIf="!loading && stats">

    <div style="display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 24px;">
      <div style="background: white; border-radius: 12px; padding: 20px;
        border: 1px solid #e2e8f0;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 8px;">
          Total Spent
        </div>
        <div style="font-size: 28px; font-weight: 700; color: #1e293b;">
          ₹{{ stats.total_expenses.toFixed(2) }}
        </div>
      </div>
      <div style="background: white; border-radius: 12px; padding: 20px;
        border: 1px solid #e2e8f0;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 8px;">
          Total Receipts
        </div>
        <div style="font-size: 28px; font-weight: 700; color: #6366f1;">
          {{ stats.total_count }}
        </div>
      </div>
      <div style="background: white; border-radius: 12px; padding: 20px;
        border: 1px solid #e2e8f0;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 8px;">
          Categories
        </div>
        <div style="font-size: 28px; font-weight: 700; color: #10b981;">
          {{ categoryEntries.length }}
        </div>
      </div>
    </div>

    <div style="background: white; border-radius: 12px; padding: 24px;
      border: 1px solid #e2e8f0;">
      <h3 style="font-size: 16px; font-weight: 600; color: #1e293b;
        margin: 0 0 20px;">
        Spending by Category
      </h3>

      <div *ngIf="categoryEntries.length === 0" style="text-align: center;
        padding: 40px; color: #94a3b8; font-size: 14px;">
        No data yet — upload some receipts first!
      </div>

      <div *ngFor="let cat of categoryEntries" style="margin-bottom: 16px;">
        <div style="display: flex; justify-content: space-between;
          font-size: 14px; margin-bottom: 6px;">
          <span style="color: #374151; font-weight: 500;">{{ cat.name }}</span>
          <span style="font-weight: 600; color: #1e293b;">
            ${{ cat.amount.toFixed(2) }}
          </span>
        </div>
        <div style="background: #f1f5f9; border-radius: 99px;
          height: 10px; overflow: hidden;">
          <div [style.width]="getBarWidth(cat.amount)"
            [style.background]="getCategoryColor(cat.name)"
            style="height: 100%; border-radius: 99px;
            transition: width 0.5s ease;">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
